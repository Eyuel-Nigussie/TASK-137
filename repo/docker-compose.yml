# Docker Compose — validation service for Linux-based CI gates.
#
# Usage:
#     docker compose build          # build the Alpine validator image
#     docker compose run build      # run the static validation checks
#
# The `build` service is a validation harness only. It does NOT compile or
# run the iOS app. iOS builds require macOS + Xcode (see README.md). For the
# actual XCTest suite use `./run_tests.sh` on macOS; `docker compose run build`
# is secondary tooling that performs static project-structure and test-
# coverage checks inside an Alpine container.
services:
  build:
    build:
      context: .
      dockerfile: Dockerfile
    image: railcommerce:latest
    restart: "no"
