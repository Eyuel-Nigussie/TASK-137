# Compose file used by CI / reviewers to build and exercise the portable
# `RailCommerce` Swift library on Linux.
#
#     docker compose build   — builds the image.
#     docker compose up      — runs `RailCommerceDemo` which exercises every
#                              service end-to-end and exits 0 on success.
#
# The iOS app itself cannot run in any container (see README → "Why Docker
# Cannot Run This App"). This compose file is the sanity harness for the
# portable business-logic layer only.
services:
  railcommerce:
    build:
      context: .
      dockerfile: Dockerfile
    image: railcommerce:latest
    # Run the demo once and exit — no restart, no long-running daemon.
    # A non-zero exit here means the portable library broke; CI should fail.
    restart: "no"
