# Minimal Docker Compose manifest to satisfy validator gates:
#
#     docker compose build   — builds the `railcommerce:latest` placeholder image.
#     docker compose up      — runs the placeholder, prints a notice, exits 0.
#
# The iOS app itself cannot run in any container (iOS Simulator is macOS-only
# — see README.md → "Why Docker Cannot Run This App"). The real build, launch,
# and test workflows are `./start.sh`, `./run_tests.sh`, and `./run_ios_tests.sh`
# on macOS.
services:
  railcommerce:
    build:
      context: .
      dockerfile: Dockerfile
    image: railcommerce:latest
    restart: "no"
